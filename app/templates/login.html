<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access - Jordan Fire Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');

        body {
            background: #050811;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        /* Animated background */
        .fire-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 120%, #ef444455 0%, #050811 60%);
            z-index: -1;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-box {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .fire-icon {
            font-size: 3rem;
            color: #ef4444;
            filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.6));
            margin-bottom: 1rem;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        h2 { color: #fff; font-weight: 600; font-size: 1.75rem; margin-bottom: 0.5rem; }
        p.subtitle { color: rgba(255,255,255,0.5); font-size: 0.95rem; }

        .form-label { color: rgba(255,255,255,0.7); font-weight: 500; font-size: 0.9rem; }
        
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #fff;
            transition: all 0.2s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15);
            color: #fff;
        }

        .btn-primary {
            background: #ef4444;
            border: none;
            border-radius: 12px;
            padding: 0.75rem;
            font-weight: 600;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.4);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 1rem;
        }

        .footer-text {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="fire-bg"></div>
    
    <div class="login-card">
        <div class="logo-box">
            <i class="bi bi-fire fire-icon"></i>
            <h2>Intelligence Portal</h2>
            <p class="subtitle">Enter password to access fire analytics</p>
        </div>

        <form action="/login" method="POST">
            <div class="mb-3">
                <label for="password" class="form-label">System Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" required autofocus>
            </div>

            {% if error %}
            <div class="error-msg">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
            </div>
            {% endif %}

            <button type="submit" class="btn btn-primary">
                Secure Login <i class="bi bi-shield-lock-fill ms-2"></i>
            </button>
        </form>

        <div class="footer-text">
            &copy; 2026 Jordan Fire Intelligence Platform<br>
            Secure Monitoring Active
        </div>
    </div>
</body>
</html>
